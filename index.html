<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📓 Mon Cahier du Coran</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Amiri:ital@0;1&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- COUVERTURE DU CAHIER -->
  <div id="cover-page">
    <div class="cover-content">
      <div class="cover-title">📓 Mon Cahier du Coran</div>
      <div class="cover-subtitle">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      <div class="cover-sub">Au nom d'Allah, le Tout Miséricordieux</div>
      <button id="open-btn">Ouvrir le Cahier ✨</button>
    </div>
  </div>

  <!-- APP PRINCIPALE -->
  <div id="app" class="hidden">

    <!-- RELIURE SPIRALE -->
    <div class="spiral"></div>

    <!-- SIDEBAR - LISTE DES SOURATES -->
    <div id="sidebar">
      <div class="sidebar-title">📚 Sourates</div>
      <input type="text" id="search" placeholder="🔍 Rechercher..." />
      <ul id="surah-list"></ul>
    </div>

    <!-- PAGE PRINCIPALE -->
    <div id="main-page">

      <!-- HEADER -->
      <div class="page-header">
        <div class="page-title" id="surah-title">Choisir une Sourate →</div>
        <div class="page-actions">
          <button class="btn-icon" id="toggle-translation" title="Afficher/Cacher traduction">🌍</button>
          <button class="btn-icon" id="toggle-memorize" title="Mode mémorisation">🧠</button>
          <button class="btn-icon" id="toggle-dark" title="Mode nuit">🌙</button>
        </div>
      </div>

      <!-- CONTENU DES VERSETS -->
      <div id="verses-container">
        <div class="empty-state">
          <p>Sélectionne une sourate dans la liste 👈</p>
          <p style="font-size:2rem">📖</p>
        </div>
      </div>

      <!-- NUMÉRO DE PAGE -->
      <div class="page-number" id="page-number"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
